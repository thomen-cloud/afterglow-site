<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Afterglow</title>
<meta name="description" content="Afterglow — a private journal for cosmetic-procedure recovery. Available on the App Store soon.">
<style>
  :root{--ink:#2B2926;--ink2:#6E6963;--accent:#A14D40;--bg:#FAF7F3;--hairline:#E8E3DC}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       background:var(--bg);color:var(--ink);line-height:1.6;
       min-height:100vh;display:flex;flex-direction:column}
  .wrap{max-width:560px;margin:0 auto;padding:0 24px;flex:1;
        display:flex;flex-direction:column;justify-content:center}
  .kicker{color:var(--accent);font-size:12px;font-weight:600;letter-spacing:.18em;
          text-transform:uppercase;margin-bottom:12px}
  h1{font-size:clamp(32px,7vw,46px);font-weight:650;letter-spacing:-.02em}
  p{color:var(--ink2);margin-top:14px}
  .soon{color:var(--ink);font-weight:600;margin-top:22px}
  a{color:var(--accent);text-decoration:underline}
  a:focus-visible{outline:3px solid var(--accent);outline-offset:2px;border-radius:2px}
  nav{margin-top:30px;display:flex;gap:22px;font-size:15px}
  footer{text-align:center;color:var(--ink2);font-size:12.5px;
         padding:22px 24px;border-top:1px solid var(--hairline)}
</style>
</head>
<body>
<div class="wrap">
  <div>
    <div class="kicker">Afterglow</div>
    <h1>A private journal for cosmetic-procedure recovery.</h1>
    <p class="soon">Available on the App Store soon.</p>
    <nav>
      <a href="privacy.html">Privacy policy</a>
      <a href="support.html">Support</a>
    </nav>
  </div>
</div>
<footer>
  <p>Afterglow is a personal documentation tool, not medical advice.<br>
  © 2026 Apex Technology Services LLC · <a href="mailto:support@yourafterglow.app">support@yourafterglow.app</a></p>
</footer>
</body>
</html>
